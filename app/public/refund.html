<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsureFlow - Refunds</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="sidebar"></div>
<main class="main">
  <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1 class="page-title">↩️ Refund & Reversals</h1>
      <p class="page-subtitle">Initiate and track payment refunds</p>
    </div>
    <button class="btn btn-primary" onclick="openRefundModal()">+ Initiate Refund</button>
  </div>

  <div class="card">
    <div class="card-title">Refund Tracker</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Refund Ref</th><th>Transaction</th><th>Policy</th><th>Amount</th><th>Reason</th><th>Status</th><th>Initiated</th><th>Actions</th></tr>
        </thead>
        <tbody id="refundBody"><tr><td colspan="8" style="text-align:center;color:var(--text-muted)">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Initiate Refund Modal -->
<div class="modal-overlay" id="refundModal">
  <div class="modal">
    <div class="modal-title">↩️ Initiate Refund</div>
    <div id="refundAlert"></div>
    <form id="refundForm">
      <div class="form-group">
        <label class="form-label">Select Payment *</label>
        <select id="refundPayment" class="form-control" required>
          <option value="">-- Select successful payment --</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Refund Amount (₹) *</label>
        <input type="number" id="refundAmount" class="form-control" min="1" required>
      </div>
      <div class="form-group">
        <label class="form-label">Reason *</label>
        <select id="refundReason" class="form-control" required>
          <option value="">-- Select reason --</option>
          <option>Duplicate payment</option>
          <option>Policy cancellation</option>
          <option>Overpayment</option>
          <option>Failed payment refund</option>
          <option>Customer request</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeRefundModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Initiate Refund</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  requireAuth();
  renderSidebar('refund');
  const user = getUser();

  async function loadRefunds() {
    const { ok, data } = await apiCall('GET', '/refunds');
    const tbody = document.getElementById('refundBody');
    if (!ok) { tbody.innerHTML = '<tr><td colspan="8">Error loading refunds</td></tr>'; return; }
    const refunds = data.data || [];
    if (!refunds.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted)">No refunds found</td></tr>'; return; }

    tbody.innerHTML = refunds.map(r => `
      <tr>
        <td><code style="font-size:12px">${r.refund_ref}</code></td>
        <td>${r.transaction_ref}</td>
        <td>${r.policy_number}</td>
        <td><strong>${formatCurrency(r.amount)}</strong></td>
        <td>${r.reason}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${formatDate(r.initiated_at)}</td>
        <td>
          ${r.status === 'initiated' && user.role === 'admin'
            ? `<button class="btn btn-success btn-sm" onclick="processRefund(${r.id})">✓ Process</button>`
            : r.processed_by_name ? `<span style="font-size:12px;color:var(--text-muted)">By ${r.processed_by_name}</span>` : '—'}
        </td>
      </tr>
    `).join('');
  }

  async function loadPayments() {
    const { ok, data } = await apiCall('GET', '/payments/history?status=success');
    if (ok) {
      (data.data || []).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.dataset.amount = p.amount;
        opt.textContent = `${p.transaction_ref} - ${p.policy_number} - ${formatCurrency(p.amount)}`;
        document.getElementById('refundPayment').appendChild(opt);
      });
    }
  }

  document.getElementById('refundPayment').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    if (opt.value) document.getElementById('refundAmount').value = opt.dataset.amount;
  });

  function openRefundModal() { document.getElementById('refundModal').classList.add('active'); }
  function closeRefundModal() { document.getElementById('refundModal').classList.remove('active'); }

  document.getElementById('refundForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
      payment_id: parseInt(document.getElementById('refundPayment').value),
      amount: parseFloat(document.getElementById('refundAmount').value),
      reason: document.getElementById('refundReason').value
    };
    const { ok, data } = await apiCall('POST', '/refunds', body);
    if (ok) { showToast('Refund initiated!', 'success'); closeRefundModal(); loadRefunds(); }
    else document.getElementById('refundAlert').innerHTML = `<div class="alert alert-error">${data.message}</div>`;
  });

  async function processRefund(id) {
    if (!confirm('Process this refund?')) return;
    const { ok, data } = await apiCall('PUT', `/refunds/${id}/process`);
    showToast(data.message, ok ? 'success' : 'error');
    loadRefunds();
  }

  loadRefunds();
  loadPayments();
</script>
</body>
</html>
