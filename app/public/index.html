<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsureFlow - Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛡️ InsureFlow</h1>
      <p>Insurance Payment Portal</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">🔐 Sign In</button>
    </form>

    <div class="demo-creds">
      <strong>Demo Credentials</strong>
      <p>🔴 Admin: admin@insureflow.com / Admin@123</p>
      <p>🟡 Agent: agent@insureflow.com / Agent@123</p>
      <p>🟢 Policyholder: john.doe@email.com / Policy@123</p>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = '/dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    btn.disabled = true;
    btn.textContent = '⏳ Signing in...';
    alertBox.innerHTML = '';

    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { ok, data } = await apiCall('POST', '/auth/login', { email, password });

    if (ok) {
      setAuth(data.data.token, data.data.user);
      showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 800);
    } else {
      alertBox.innerHTML = `<div class="alert alert-error">⚠️ ${data.message}</div>`;
      btn.disabled = false;
      btn.textContent = '🔐 Sign In';
        setTimeout(() => {
    alertBox.innerHTML = '';
  }, 100000);

    }
  });
</script>
</body>
</html>
