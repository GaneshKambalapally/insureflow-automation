name: InsureFlow Automation Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install automation dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install app dependencies
        run: cd app && npm install

      - name: Seed database
        run: cd app && node database/seed.js

      - name: Create env file
        run: |
          if [ -f .env.test.example ]; then
            cp .env.test.example .env.test
          else
            cat > .env.test << EOF
          BASE_URL=http://localhost:3000
          API_URL=http://localhost:3000/api
          ADMIN_EMAIL=admin@insureflow.com
          ADMIN_PASSWORD=Admin@123
          AGENT_EMAIL=agent@insureflow.com
          AGENT_PASSWORD=Agent@123
          POLICYHOLDER_EMAIL=john.doe@email.com
          POLICYHOLDER_PASSWORD=Policy@123
          EOF
          fi
          cat .env.test

      - name: Start app server
        run: |
          cd app
          npm start > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          sleep 2
        env:
          PORT: 3000
          NODE_ENV: test

      - name: Wait for app server
        run: |
          APP_PID=$(cat /tmp/app.pid)
          for i in {1..60}; do
            if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ App server is ready"
              exit 0
            fi
            # Check if process is still running
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "❌ App server process died"
              cat /tmp/app.log
              exit 1
            fi
            echo "⏳ Waiting for app server... ($i/60)"
            sleep 1
          done
          echo "❌ App server failed to start in time"
          cat /tmp/app.log
          exit 1

      - name: Verify test environment
        run: |
          echo "Node version:"
          node --version
          echo "Playwright version:"
          npx playwright --version
          echo "Environment:"
          env | grep -E "BASE_URL|API_URL|PORT" || true
          echo "Checking app server:"
          curl -v http://localhost:3000/api/health

      - name: Run all tests
        run: npm test
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3000/api
          ADMIN_EMAIL: admin@insureflow.com
          ADMIN_PASSWORD: Admin@123
          AGENT_EMAIL: agent@insureflow.com
          AGENT_PASSWORD: Agent@123
          POLICYHOLDER_EMAIL: john.doe@email.com
          POLICYHOLDER_PASSWORD: Policy@123

      - name: Print app server logs on failure
        if: failure()
        run: |
          echo "=== App Server Logs ==="
          cat /tmp/app.log || echo "No logs available"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7