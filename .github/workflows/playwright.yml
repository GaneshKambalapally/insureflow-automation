name: InsureFlow Automation Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install automation dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install app dependencies
        run: cd app && npm install

      - name: Seed database
        run: cd app && node database/seed.js

      - name: Create env file
        run: cp .env.test.example .env.test

      - name: Start app server
        run: cd app && npm start > /tmp/app.log 2>&1 &
        env:
          PORT: 3000

      - name: Wait for app server
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App server is ready"
              exit 0
            fi
            echo "Waiting for app server... ($i/30)"
            sleep 1
          done
          echo "App server failed to start"
          cat /tmp/app.log
          exit 1

      - name: Run all tests
        run: npm test
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3000/api
          ADMIN_EMAIL: admin@insureflow.com
          ADMIN_PASSWORD: Admin@123
          AGENT_EMAIL: agent@insureflow.com
          AGENT_PASSWORD: Agent@123
          POLICYHOLDER_EMAIL: john.doe@email.com
          POLICYHOLDER_PASSWORD: Policy@123

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7