name: InsureFlow Automation Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install automation dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install app dependencies
        run: cd app && npm install

      - name: Seed database
        run: cd app && node database/seed.js

      - name: Start InsureFlow app
        run: |
          cd app
          node server.js &
          echo "Waiting for app to start..."
          sleep 10

      - name: Verify app is running
        run: |
          curl -s http://localhost:3000 | grep -q "InsureFlow" \
          && echo "✅ App is running" \
          || curl -s http://localhost:3000/api/auth/login \
          -X POST \
          -H "Content-Type: application/json" \
          -d '{"email":"admin@insureflow.com","password":"Admin@123"}' \
          | grep -q "token" \
          && echo "✅ App API is responding" \
          || (echo "❌ App not responding" && exit 1)

      - name: Create env file
        run: cp .env.test.example .env.test

      - name: Run all tests
        run: npm test
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:3000/api
          ADMIN_EMAIL: admin@insureflow.com
          ADMIN_PASSWORD: Admin@123
          AGENT_EMAIL: agent@insureflow.com
          AGENT_PASSWORD: Agent@123
          POLICYHOLDER_EMAIL: john.doe@email.com
          POLICYHOLDER_PASSWORD: Policy@123

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7